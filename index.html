<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Cropper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --accent: #4f8ef7;
      --text: #e8e8e8;
      --muted: #666;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    nav { margin-bottom: 32px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--text); }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    /* Drop zone */
    #dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 20px;
    }
    #dropzone.over, #dropzone:hover { border-color: var(--accent); background: #0f1a2e; }
    #dropzone .drop-icon { font-size: 2rem; margin-bottom: 10px; }
    #dropzone p { color: var(--muted); font-size: 0.9rem; }
    #dropzone strong { color: var(--text); }
    #fileInput { display: none; }

    /* Layout: canvas left, file list right */
    #workspace {
      display: none;
      gap: 16px;
    }
    #workspace.visible { display: grid; grid-template-columns: 1fr 280px; }
    @media (max-width: 640px) {
      #workspace.visible { grid-template-columns: 1fr; }
    }

    /* Canvas */
    #canvasWrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      line-height: 0;
      position: relative;
    }
    #preview {
      display: block;
      width: 100%;
      cursor: crosshair;
    }
    #cropInfo {
      padding: 10px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 0; /* reset */
      display: block;
      line-height: 1.4;
    }
    #cropInfo span { color: var(--text); }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 12px; }
    .sidebar h2 { font-size: 0.95rem; color: var(--muted); font-weight: 500; }
    #fileList {
      flex: 1;
      overflow-y: auto;
      max-height: 420px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .file-item.active { border-color: var(--accent); }
    .thumb { width: 36px; height: 36px; object-fit: contain; border-radius: 4px; flex-shrink: 0;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 10px 10px; }
    .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    button {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      font-family: inherit;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
    .btn-primary:not(:disabled):hover { background: #3a7de8; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { color: var(--text); border-color: #444; }

    /* Progress */
    #progressWrap { display: none; margin-top: 16px; }
    #progressWrap .label { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    .progress-bar-wrap { background: var(--border); border-radius: 4px; height: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.2s; width: 0%; }
    #statusMsg { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }
  </style>
</head>
<body>
